<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logout</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:
            linear-gradient(135deg, #0f172a, #1e293b, #2563eb);
            overflow:hidden;
        }

        .background-blur{
            position:absolute;
            width:350px;
            height:350px;
            border-radius:50%;
            filter: blur(90px);
            z-index:0;
        }

        .blur-1{
            background:#2563eb;
            top:-100px;
            left:-100px;
        }

        .blur-2{
            background:#7c3aed;
            bottom:-100px;
            right:-100px;
        }

        .logout-card{
            position:relative;
            z-index:1;
            width:420px;
            padding:40px 35px;
            border-radius:25px;
            background: rgba(255,255,255,0.08);
            border:1px solid rgba(255,255,255,0.2);
            backdrop-filter: blur(20px);
            box-shadow:0 8px 32px rgba(0,0,0,0.3);
            text-align:center;
            color:white;
        }

        .logout-icon{
            font-size:60px;
            margin-bottom:20px;
            color:#f87171;
        }

        .logout-title{
            font-size:30px;
            font-weight:700;
            margin-bottom:10px;
        }

        .logout-text{
            color:#d1d5db;
            margin-bottom:30px;
        }

        .btn-area{
            display:flex;
            gap:15px;
        }

        .btn-logout{
            flex:1;
            height:50px;
            border:none;
            border-radius:12px;
            font-size:17px;
            font-weight:600;
            background:linear-gradient(to right,#ef4444,#dc2626);
            transition:0.3s;
        }

        .btn-home{
            flex:1;
            height:50px;
            border:none;
            border-radius:12px;
            font-size:17px;
            font-weight:600;
            background:linear-gradient(to right,#2563eb,#7c3aed);
            transition:0.3s;
            color:white;
            text-decoration:none;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .btn-logout:hover,
        .btn-home:hover{
            transform: translateY(-2px);
        }

        @media(max-width:450px){
            .logout-card{
                width:90%;
                padding:30px 25px;
            }

            .btn-area{
                flex-direction:column;
            }
        }
    </style>
</head>
<body>

<div class="background-blur blur-1"></div>
<div class="background-blur blur-2"></div>

<div class="logout-card">

    <div class="logout-icon">
        <i class="fa-solid fa-right-from-bracket"></i>
    </div>

    <h1 class="logout-title">
        Logout
    </h1>

    <p class="logout-text">
        Siz rostdan ham akkauntdan chiqmoqchimisiz?
    </p>

    <form method="POST">
        {% csrf_token %}

        <div class="btn-area">

            <a href="/" class="btn-home">
                Bekor qilish
            </a>

            <button type="submit"
                    class="btn btn-danger btn-logout">
                Logout
            </button>

        </div>
    </form>

</div>

</body>
</html>
