<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:
            linear-gradient(135deg, #0f172a, #1e293b, #2563eb);
            overflow:hidden;
        }

        .background-blur{
            position:absolute;
            width:350px;
            height:350px;
            border-radius:50%;
            filter: blur(90px);
            z-index:0;
        }

        .blur-1{
            background:#2563eb;
            top:-100px;
            left:-100px;
        }

        .blur-2{
            background:#7c3aed;
            bottom:-100px;
            right:-100px;
        }

        .login-card{
            position:relative;
            z-index:1;
            width:400px;
            padding:40px 35px;
            border-radius:25px;
            background: rgba(255,255,255,0.08);
            border:1px solid rgba(255,255,255,0.2);
            backdrop-filter: blur(20px);
            box-shadow:0 8px 32px rgba(0,0,0,0.3);
            color:white;
        }

        .login-title{
            text-align:center;
            font-size:32px;
            font-weight:700;
            margin-bottom:10px;
        }

        .login-text{
            text-align:center;
            color:#d1d5db;
            margin-bottom:30px;
        }

        .form-label{
            margin-bottom:8px;
            color:#e5e7eb;
        }

        .input-group-text{
            background:rgba(255,255,255,0.12);
            border:none;
            color:white;
        }

        .form-control{
            background:rgba(255,255,255,0.12);
            border:none;
            color:white;
            height:50px;
        }

        .form-control::placeholder{
            color:#d1d5db;
        }

        .form-control:focus{
            background:rgba(255,255,255,0.18);
            color:white;
            box-shadow:none;
        }

        .btn-login{
            width:100%;
            height:50px;
            border:none;
            border-radius:12px;
            font-size:18px;
            font-weight:600;
            margin-top:10px;
            background:linear-gradient(to right,#2563eb,#7c3aed);
            transition:0.3s;
        }

        .btn-login:hover{
            transform:translateY(-2px);
        }

        .footer-text{
            text-align:center;
            margin-top:20px;
            color:#cbd5e1;
            font-size:14px;
        }

        @media(max-width:450px){
            .login-card{
                width:90%;
                padding:30px 25px;
            }
        }
    </style>
</head>
<body>

<div class="background-blur blur-1"></div>
<div class="background-blur blur-2"></div>

<div class="login-card">

    <h1 class="login-title">
        <i class="fa-solid fa-user-shield"></i>
        Admin
    </h1>

    <p class="login-text">
        Dashboardga kirish uchun login qiling
    </p>

    <form method="POST">
        {% csrf_token %}

        <label class="form-label">Username</label>
        <div class="input-group mb-3">
            <span class="input-group-text">
                <i class="fa-solid fa-user"></i>
            </span>

            <input type="text"
                   name="username"
                   class="form-control"
                   placeholder="Username kiriting">
        </div>

        <label class="form-label">Password</label>
        <div class="input-group mb-4">
            <span class="input-group-text">
                <i class="fa-solid fa-lock"></i>
            </span>

            <input type="password"
                   name="password"
                   class="form-control"
                   placeholder="Password kiriting">
        </div>

        <button class="btn btn-primary btn-login" type="submit">
            Login
        </button>
    </form>

    <div class="footer-text">
        Admin Panel © 2026
    </div>

</div>

</body>
</html>
