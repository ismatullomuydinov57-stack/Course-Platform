{% extends 'base.html' %}

{% block content %}

<h1>Courses</h1>

{% for course in courses %}

    <h3>{{ course.title }}</h3>
    <p>{{ course.description }}</p>

    <strong>Students:</strong>

    <ul>
        {% for student in course.students.all %}
            <li>{{ student.name }}</li>
        {% endfor %}
    </ul>

{% endfor %}

{% endblock %}
